name: Checkin
on:
  schedule:
    - cron: "45 02 * * *"
  workflow_dispatch:

env:
  CHECKIN_CONFIG_JSON: ${{ secrets.CHECKIN_CONFIG_JSON }}

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    name: Auto Checkin for Traffic

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"

      - name: Run Checkin Script
        run: |
          if [ -z "$CHECKIN_CONFIG_JSON" ]; then
            echo "CHECKIN_CONFIG_JSON is empty; skip traffic checkin."
            exit 0
          fi

          printf '%s' "$CHECKIN_CONFIG_JSON" > ./.github/actions/checkin/config.json
          python ./.github/actions/checkin/universal.py || echo "Checkin script failed"

      - name: Record Timestamp
        run: date "+%Y-%m-%d %H:%M:%S"
