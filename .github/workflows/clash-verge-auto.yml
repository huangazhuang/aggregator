name: Clash Verge Auto

on:
  schedule:
    # Refresh existing subscriptions every 6 hours.
    - cron: "17 */6 * * *"
    # Rebuild the source list every Monday 00:47 UTC / 08:47 Asia-Shanghai.
    - cron: "47 0 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "auto chooses refresh normally and collect on the weekly run."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - refresh
          - collect
      alive_check:
        description: "Run Clash liveness checks before publishing."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: clash-verge-auto
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  OUTPUT_BRANCH: clash-verge-output
  PROFILE_FILE: clash.yaml
  REQUESTED_MODE: ${{ github.event.inputs.mode || 'auto' }}
  REQUESTED_ALIVE_CHECK: ${{ github.event.inputs.alive_check || 'true' }}
  SCHEDULE_NAME: ${{ github.event.schedule || '' }}
  GH_TOKEN: ${{ github.token }}
  CLASH_SUBSCRIPTIONS_SECRET: ${{ secrets.CLASH_SUBSCRIPTIONS }}
  CLASH_SUBSCRIPTIONS_VAR: ${{ vars.CLASH_SUBSCRIPTIONS }}
  CLASH_SUBSCRIPTION_URL_SECRET: ${{ secrets.CLASH_SUBSCRIPTION_URL }}
  CLASH_SUBSCRIPTION_URL_VAR: ${{ vars.CLASH_SUBSCRIPTION_URL }}
  ENABLE_SPECIAL_PROTOCOLS: ${{ vars.ENABLE_SPECIAL_PROTOCOLS || 'true' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"
          cache: "pip"

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Restore previous data
        run: |
          mkdir -p data
          git fetch origin "${OUTPUT_BRANCH}:refs/remotes/origin/${OUTPUT_BRANCH}" --depth=1 || true

          for name in subscribes.txt domains.txt valid-domains.txt; do
            if git show "origin/${OUTPUT_BRANCH}:${name}" > "/tmp/${name}" 2>/dev/null; then
              cp "/tmp/${name}" "data/${name}"
              echo "Restored ${name} from ${OUTPUT_BRANCH}."
            fi
          done

      - name: Build manual subscription config
        id: manual
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request

          raw = "\n".join(
              x
              for x in [
                  os.environ.get("CLASH_SUBSCRIPTIONS_SECRET", ""),
                  os.environ.get("CLASH_SUBSCRIPTIONS_VAR", ""),
              ]
              if x
          )

          remote = os.environ.get("CLASH_SUBSCRIPTION_URL_SECRET", "") or os.environ.get("CLASH_SUBSCRIPTION_URL_VAR", "")
          if remote:
              req = urllib.request.Request(remote, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=60) as resp:
                  raw += "\n" + resp.read().decode("utf-8", errors="ignore")

          urls = []
          seen = set()
          for line in raw.replace("\r", "\n").split("\n"):
              for part in re.split(r"[\s,]+", line):
                  url = part.strip().strip("'\"<>").rstrip(",;)]")
                  if not url.startswith(("http://", "https://")):
                      continue
                  if url not in seen:
                      urls.append(url)
                      seen.add(url)

          if not urls:
              print("manual=false")
              sys.exit(0)

          config = {
              "domains": [
                  {
                      "name": "manual-subscriptions",
                      "sub": urls,
                      "enable": True,
                      "rename": "",
                      "include": "",
                      "exclude": "",
                      "push_to": ["clash-verge"],
                      "ignorede": True,
                      "liveness": True,
                      "rate": 20.0,
                      "secure": False,
                  }
              ],
              "crawl": {"enable": False},
              "groups": {
                  "clash-verge": {
                      "emoji": True,
                      "list": False,
                      "targets": {"clash": "clash-local"},
                  }
              },
              "storage": {
                  "engine": "local",
                  "items": {"clash-local": {"folderid": "", "fileid": "clash.yaml"}},
              },
              "delay": 10000,
          }

          os.makedirs("subscribe/config", exist_ok=True)
          with open("subscribe/config/clash-verge.generated.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          os.makedirs("data", exist_ok=True)
          with open("data/subscribes.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(urls) + "\n")

          print(f"manual=true count={len(urls)}")
          PY

          if [ -s subscribe/config/clash-verge.generated.json ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Choose run mode
        id: mode
        shell: bash
        run: |
          mode="${REQUESTED_MODE}"
          if [ "${mode}" = "auto" ]; then
            if [ "${SCHEDULE_NAME}" = "47 0 * * 1" ]; then
              mode="collect"
            else
              mode="refresh"
            fi
          fi

          if [ "${{ steps.manual.outputs.enabled }}" = "true" ]; then
            mode="manual"
          elif [ ! -s data/subscribes.txt ]; then
            mode="collect"
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "Selected mode: ${mode}"

      - name: Generate Clash profile from manual subscriptions
        if: steps.mode.outputs.mode == 'manual'
        shell: bash
        run: |
          mkdir -p data
          export LOCAL_BASEDIR="${GITHUB_WORKSPACE}/data"

          if [ "${REQUESTED_ALIVE_CHECK}" = "true" ]; then
            export SKIP_ALIVE_CHECK="false"
          else
            export SKIP_ALIVE_CHECK="true"
          fi

          python -u subscribe/process.py -s subscribe/config/clash-verge.generated.json --overwrite --invisible

          if [ ! -s "data/${PROFILE_FILE}" ]; then
            echo "Manual subscriptions did not produce data/${PROFILE_FILE}."
            exit 1
          fi

      - name: Generate Clash profile from collected sources
        if: steps.mode.outputs.mode != 'manual'
        shell: bash
        run: |
          base_args=(--all --targets clash --num 64 --delay 10000 --easygoing)
          fallback_args=(--all --targets clash --num 64 --delay 10000 --easygoing --skip --overwrite)

          if [ "${REQUESTED_ALIVE_CHECK}" != "true" ]; then
            base_args+=(--skip)
          fi

          run_mode="${{ steps.mode.outputs.mode }}"
          if [ "${run_mode}" = "refresh" ]; then
            base_args+=(--refresh)
          else
            base_args+=(--overwrite)
          fi

          set +e
          python -u subscribe/collect.py "${base_args[@]}"
          status=$?
          set -e

          if [ "${status}" -ne 0 ] || [ ! -s "data/${PROFILE_FILE}" ]; then
            if [ "${REQUESTED_ALIVE_CHECK}" = "true" ]; then
              echo "Airport collection did not produce live nodes; continuing with crawler mode."
            else
              echo "Primary generation did not produce ${PROFILE_FILE}; trying a no-alive-check rebuild."
              set +e
              python -u subscribe/collect.py "${fallback_args[@]}"
              status=$?
              set -e
            fi
          fi

          if [ -s "data/${PROFILE_FILE}" ]; then
            cp "data/${PROFILE_FILE}" "data/collect-${PROFILE_FILE}"
          else
            echo "No airport collection profile available for merge."
          fi

      - name: Build crawler config
        if: steps.mode.outputs.mode != 'manual'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          config = {
              "domains": [],
              "crawl": {
                  "enable": True,
                  "threshold": 10,
                  "singlelink": True,
                  "persist": {
                      "subs": "crawler-subs-store",
                      "proxies": "crawler-proxies-store",
                  },
                  "config": {
                      "rename": "",
                      "include": "",
                      "exclude": "",
                      "push_to": ["crawler"],
                      "ignorede": True,
                      "liveness": True,
                      "rate": 20.0,
                      "secure": False,
                  },
                  "github": {
                      "enable": True,
                      "pages": 10,
                      "push_to": ["crawler"],
                      "exclude": "",
                      "spams": [],
                  },
                  "google": {
                      "enable": True,
                      "limits": 1000,
                      "qdr": 30,
                      "push_to": ["crawler"],
                      "exclude": "",
                      "notinurl": ["github.com", "githubusercontent.com"],
                  },
                  "yandex": {
                      "enable": True,
                      "pages": 20,
                      "within": 30,
                      "push_to": ["crawler"],
                      "exclude": "",
                      "notinurl": ["github.com", "githubusercontent.com"],
                  },
                  "telegram": {
                      "enable": True,
                      "pages": 12,
                      "limits": 50,
                      "users": {
                          "v2raydailyupdate": {
                              "enable": True,
                              "include": "|(?:vmess|trojan|ss|ssr|snell|hysteria2|vless|hysteria|tuic|anytls)://[a-zA-Z0-9:.?+=@%&#_\\-/]{10,}",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "vmessorg": {
                              "enable": True,
                              "include": "|(?:vmess|trojan|ss|ssr|snell|hysteria2|vless|hysteria|tuic|anytls)://[a-zA-Z0-9:.?+=@%&#_\\-/]{10,}",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "PrivateVPNs": {
                              "enable": True,
                              "include": "|(?:vmess|trojan|ss|ssr|snell|hysteria2|vless|hysteria|tuic|anytls)://[a-zA-Z0-9:.?+=@%&#_\\-/]{10,}",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "freev2rayssr": {
                              "enable": True,
                              "include": "|(?:vmess|trojan|ss|ssr|snell|hysteria2|vless|hysteria|tuic|anytls)://[a-zA-Z0-9:.?+=@%&#_\\-/]{10,}",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "proxy_mtm": {
                              "enable": True,
                              "include": "|(?:vmess|trojan|ss|ssr|snell|hysteria2|vless|hysteria|tuic|anytls)://[a-zA-Z0-9:.?+=@%&#_\\-/]{10,}",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "proxystore11": {
                              "enable": True,
                              "include": "|(?:vmess|trojan|ss|ssr|snell|hysteria2|vless|hysteria|tuic|anytls)://[a-zA-Z0-9:.?+=@%&#_\\-/]{10,}",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                      },
                  },
                  "twitter": {
                      "enable": True,
                      "users": {
                          "v2raydailyupdate": {
                              "enable": True,
                              "num": 200,
                              "include": "",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "vpnfail": {
                              "enable": True,
                              "num": 200,
                              "include": "",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "freevpn724": {
                              "enable": True,
                              "num": 200,
                              "include": "",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "V2rayCollector": {
                              "enable": True,
                              "num": 200,
                              "include": "",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                          "freev2raydaily": {
                              "enable": True,
                              "num": 200,
                              "include": "",
                              "exclude": "",
                              "config": {"push_to": ["crawler"], "ignorede": True, "liveness": True, "rate": 20.0},
                              "push_to": ["crawler"],
                          },
                      },
                  },
                  "repositories": [],
                  "pages": [],
                  "scripts": [
                      {
                          "enable": True,
                          "script": "gitforks#collect_subs",
                          "params": {
                              "username": "wzdnzd",
                              "repository": "aggregator",
                              "sort": "newest",
                              "persist": {"folderid": "", "fileid": "crawler-gitfork-subs.txt"},
                              "config": {
                                  "push_to": ["crawler"],
                                  "ignorede": True,
                                  "liveness": True,
                                  "rate": 20.0,
                              },
                              "remain": 0,
                              "life": 0,
                          },
                      },
                      {
                          "enable": True,
                          "script": "v2rayse#fetch",
                          "params": {
                              "url": "https://v2rayse.com",
                              "nopublic": True,
                              "types": ["ss", "ssr", "vmess", "trojan", "tuic", "snell", "vless", "hysteria2", "hysteria", "http", "socks5", "anytls"],
                              "persist": {
                                  "proxies": {"folderid": "", "fileid": "crawler-v2rayse.txt"},
                                  "modified": {"folderid": "", "fileid": "crawler-v2rayse-modified.json"},
                              },
                              "config": {
                                  "push_to": ["crawler"],
                                  "ignorede": True,
                                  "liveness": True,
                                  "rate": 20.0,
                              },
                          },
                      },
                  ],
              },
              "groups": {
                  "crawler": {
                      "emoji": True,
                      "list": False,
                      "targets": {"clash": "crawler-clash-local"},
                  }
              },
              "storage": {
                  "engine": "local",
                  "items": {
                      "crawler-clash-local": {"folderid": "", "fileid": "crawler-clash.yaml"},
                      "crawler-subs-store": {"folderid": "", "fileid": "crawler-subs.json"},
                      "crawler-proxies-store": {"folderid": "", "fileid": "crawler-proxies.txt"},
                  },
              },
              "delay": 10000,
          }

          os.makedirs("subscribe/config", exist_ok=True)
          with open("subscribe/config/clash-verge-crawler.generated.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          PY

      - name: Generate Clash profile from crawlers
        if: steps.mode.outputs.mode != 'manual'
        shell: bash
        run: |
          export LOCAL_BASEDIR="${GITHUB_WORKSPACE}/data"

          if [ "${REQUESTED_ALIVE_CHECK}" = "true" ]; then
            export SKIP_ALIVE_CHECK="false"
          else
            export SKIP_ALIVE_CHECK="true"
          fi

          set +e
          python -u subscribe/process.py -s subscribe/config/clash-verge-crawler.generated.json --overwrite --flexible --invisible --timeout 10000
          status=$?
          set -e

          if [ "${status}" -ne 0 ]; then
            echo "Crawler generation failed; keeping airport collection output."
          elif [ ! -s "data/crawler-clash.yaml" ]; then
            echo "Crawler generation produced no Clash profile; keeping airport collection output."
          fi

      - name: Merge collected and crawled profiles
        if: steps.mode.outputs.mode != 'manual'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys

          sys.path.insert(0, os.path.abspath("subscribe"))

          import yaml
          import clash

          output = os.path.join("data", os.environ.get("PROFILE_FILE", "clash.yaml"))
          sources = [
              os.path.join("data", "collect-clash.yaml"),
              os.path.join("data", "crawler-clash.yaml"),
          ]
          proxies = []

          for source in sources:
              if not os.path.exists(source) or os.path.getsize(source) <= 0:
                  continue

              with open(source, "r", encoding="utf-8", errors="ignore") as f:
                  try:
                      data = yaml.load(f, Loader=yaml.SafeLoader) or {}
                  except Exception:
                      data = {}

              items = data.get("proxies", [])
              if isinstance(items, list):
                  proxies.extend([p for p in items if isinstance(p, dict)])
                  print(f"{source}: {len(items)} proxies")

          if not proxies:
              print("No proxies found to merge.")
              sys.exit(1)

          config = {
              "mixed-port": 7890,
              "external-controller": clash.EXTERNAL_CONTROLLER,
              "mode": "Rule",
              "log-level": "silent",
          }
          config.update(clash.filter_proxies(proxies))

          with open(output, "w", encoding="utf-8") as f:
              yaml.add_representer(clash.QuotedStr, clash.quoted_scalar)
              yaml.dump(config, f, allow_unicode=True)

          print(f"merged {len(proxies)} source proxies into {len(config.get('proxies', []))} unique proxies")
          PY

      - name: Prepare publish files
        shell: bash
        run: |
          mkdir -p public
          cp "data/${PROFILE_FILE}" "public/${PROFILE_FILE}"

          for name in subscribes.txt domains.txt valid-domains.txt collect-clash.yaml crawler-clash.yaml crawler-subs.json crawler-proxies.txt crawler-gitfork-subs.txt crawler-v2rayse.txt crawler-v2rayse-modified.json; do
            if [ -f "data/${name}" ]; then
              cp "data/${name}" "public/${name}"
            fi
          done

          run_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${OUTPUT_BRANCH}/${PROFILE_FILE}"
          proxy_count="$(python - <<'PY'
          import os
          import yaml

          filename = os.path.join("data", os.environ.get("PROFILE_FILE", "clash.yaml"))
          try:
              with open(filename, "r", encoding="utf-8", errors="ignore") as f:
                  data = yaml.load(f, Loader=yaml.SafeLoader) or {}
              print(len(data.get("proxies", [])))
          except Exception:
              print(0)
          PY
          )"
          printf "%s\n" "${run_at}" > public/last-run.txt
          printf '{"run_at":"%s","mode":"%s","alive_check":"%s","proxy_count":%s,"profile_url":"%s"}\n' "${run_at}" "${{ steps.mode.outputs.mode }}" "${REQUESTED_ALIVE_CHECK}" "${proxy_count}" "${url}" > public/status.json
          cat > public/README.md <<EOF
          # Clash Verge Auto Profile

          Subscription URL:

          ${url}

          Last run: ${run_at}
          EOF

      - name: Publish profile branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/${OUTPUT_BRANCH}"; then
            git worktree add -B "${OUTPUT_BRANCH}" "${publish_dir}" "origin/${OUTPUT_BRANCH}"
          else
            git worktree add --detach "${publish_dir}"
            cd "${publish_dir}"
            git switch --orphan "${OUTPUT_BRANCH}"
            git reset
            cd "${GITHUB_WORKSPACE}"
          fi

          cp public/README.md "${publish_dir}/README.md"
          cp "public/${PROFILE_FILE}" "${publish_dir}/${PROFILE_FILE}"
          cp public/last-run.txt "${publish_dir}/last-run.txt"
          cp public/status.json "${publish_dir}/status.json"

          for name in subscribes.txt domains.txt valid-domains.txt collect-clash.yaml crawler-clash.yaml crawler-subs.json crawler-proxies.txt crawler-gitfork-subs.txt crawler-v2rayse.txt crawler-v2rayse-modified.json; do
            if [ -f "public/${name}" ]; then
              cp "public/${name}" "${publish_dir}/${name}"
            fi
          done

          cd "${publish_dir}"
          git add README.md "${PROFILE_FILE}" last-run.txt status.json
          for name in subscribes.txt domains.txt valid-domains.txt collect-clash.yaml crawler-clash.yaml crawler-subs.json crawler-proxies.txt crawler-gitfork-subs.txt crawler-v2rayse.txt crawler-v2rayse-modified.json; do
            if [ -f "${name}" ]; then
              git add "${name}"
            fi
          done
          git commit -m "Update Clash Verge profile" --allow-empty
          git push origin "HEAD:${OUTPUT_BRANCH}"

      - name: Summary
        shell: bash
        run: |
          url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${OUTPUT_BRANCH}/${PROFILE_FILE}"
          echo "### Clash Verge subscription" >> "${GITHUB_STEP_SUMMARY}"
          echo "${url}" >> "${GITHUB_STEP_SUMMARY}"
